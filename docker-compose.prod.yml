services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-waizai_db}
      POSTGRES_USER: ${POSTGRES_USER:-waizai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-waizai_user} -d ${POSTGRES_DB:-waizai_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-waizai_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-waizai_db}
      REDIS_URL: redis://redis:6379
      BASE_URL: ${BASE_URL:-https://whatsapp.agencyfic.com}
      WA_SESSION_DIR: /app/whatsapp-auth-state
      WA_RECONNECT_DELAY_MS: ${WA_RECONNECT_DELAY_MS:-3000}
      WA_EGRESS_PROXY_URLS: ${WA_EGRESS_PROXY_URLS:-}
      WA_EGRESS_PROXY_DEFAULT: ${WA_EGRESS_PROXY_DEFAULT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
      - proxy
    volumes:
      - whatsapp_auth_state:/app/whatsapp-auth-state
    labels:
      - traefik.enable=true
      - traefik.http.routers.whatsapp-api.rule=Host(`whatsapp.agencyfic.com`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`) || Path(`/health`))
      - traefik.http.routers.whatsapp-api.entrypoints=websecure
      - traefik.http.routers.whatsapp-api.tls.certresolver=letsencrypt
      - traefik.http.routers.whatsapp-api.priority=100
      - traefik.http.routers.whatsapp-api.service=whatsapp-api
      - traefik.http.services.whatsapp-api.loadbalancer.server.port=5000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://whatsapp.agencyfic.com/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-https://whatsapp.agencyfic.com}
        VITE_SUPERADMIN_SLUG: ${VITE_SUPERADMIN_SLUG:-priyanshu}
    restart: unless-stopped
    expose:
      - "4173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4173/"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.whatsapp.rule=Host(`whatsapp.agencyfic.com`)
      - traefik.http.routers.whatsapp.entrypoints=websecure
      - traefik.http.routers.whatsapp.tls.certresolver=letsencrypt
      - traefik.http.routers.whatsapp.priority=1
      - traefik.http.services.whatsapp.loadbalancer.server.port=4173

volumes:
  postgres_data:
  redis_data:
  whatsapp_auth_state:

networks:
  internal:
    driver: bridge
    internal: true
  proxy:
    external: true
    name: proxy
